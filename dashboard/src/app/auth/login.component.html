<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="card login-card">
        <div class="card-header text-center"><h4 class="mb-0">🔨 Organizathor</h4></div>
        <div class="card-body">
          <form (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input type="email" class="form-control" id="email" [(ngModel)]="email" name="email" placeholder="tu@email.com" required [disabled]="loading">
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">Contraseña</label>
              <input type="password" class="form-control" id="password" [(ngModel)]="password" name="password" placeholder="Tu contraseña" required [disabled]="loading">
            </div>
            <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>
            <button type="submit" class="btn btn-primary w-100" [disabled]="loading">
              <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
              {{ loading ? 'Cargando...' : 'Entrar' }}
            </button>
          </form>
          <hr class="my-3">
          <p class="text-center mb-0">¿No tienes cuenta? <a routerLink="/auth/register">Regístrate aquí</a></p>
        </div>
      </div>
    </div>
  </div>
</div>
