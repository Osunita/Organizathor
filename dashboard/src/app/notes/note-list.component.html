<div class="container-fluid mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-sticky me-2"></i>Notas</h2>
    <button class="btn btn-primary" (click)="openCreateModal()"><i class="bi bi-plus-circle me-2"></i>Nueva Nota</button>
  </div>
  <app-filter-bar (filterChange)="onFilterChange($event)"></app-filter-bar>
  <div *ngIf="loading()" class="text-center py-5"><div class="spinner-border text-primary"></div></div>
  <div *ngIf="!loading() && notes().length === 0" class="alert alert-info">No hay notas.</div>
  <div *ngIf="!loading() && notes().length > 0" class="row">
    <div *ngFor="let note of notes()" class="col-md-4 col-lg-3 mb-4">
      <div class="card h-100 shadow-sm" [style.background-color]="getNoteBackground(note)">
        <div class="card-body">
          <h5 class="card-title">{{ note.titulo }}</h5>
          <p class="card-text" *ngIf="note.contenido">{{ note.contenido.length > 100 ? (note.contenido | slice:0:100) + '...' : note.contenido }}</p>
          <p class="card-text text-muted" *ngIf="!note.contenido"><em>Sin contenido</em></p>
        </div>
        <div class="card-footer">
          <div class="d-flex justify-content-between">
            <span *ngIf="note.categoriaNombre" class="badge bg-secondary">{{ note.categoriaNombre }}</span>
            <span *ngIf="!note.categoriaNombre" class="text-muted">Sin categoría</span>
            <small>{{ formatDate(note.fechaCreacion) }}</small>
          </div>
          <div class="btn-group btn-group-sm mt-2 w-100">
            <button class="btn btn-outline-primary" (click)="openEditModal(note)"><i class="bi bi-pencil"></i></button>
            <button class="btn btn-outline-danger" (click)="deleteNote(note)"><i class="bi bi-trash"></i></button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <app-note-form *ngIf="showModal()" [note]="editingNote" (close)="onModalClose()"></app-note-form>
</div>
