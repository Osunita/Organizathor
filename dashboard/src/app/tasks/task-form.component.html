<div class="modal show d-block" tabindex="-1" style="background-color: rgba(0,0,0,0.5);">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title">{{ task ? 'Editar Tarea' : 'Nueva Tarea' }}</h5>
        <button type="button" class="btn-close btn-close-white" (click)="onCancel()"></button>
      </div>
      <div class="modal-body">
        <form [formGroup]="form" (ngSubmit)="onSubmit()">
          <div class="mb-3">
            <label for="titulo" class="form-label">Título *</label>
            <input type="text" class="form-control" id="titulo" formControlName="titulo" placeholder="Título de la tarea">
            <div class="invalid-feedback" *ngIf="form.get('titulo')?.errors?.['required']">El título es requerido.</div>
            <div class="invalid-feedback" *ngIf="form.get('titulo')?.errors?.['minlength']">Mínimo 3 caracteres.</div>
          </div>
          <div class="mb-3">
            <label for="contenido" class="form-label">Descripción</label>
            <textarea class="form-control" id="contenido" formControlName="contenido" rows="3" placeholder="Descripción opcional"></textarea>
            <small class="form-text text-muted">La categoría se asignará automáticamente según el contenido.</small>
          </div>
          <div class="mb-3">
            <label for="prioridad" class="form-label">Prioridad</label>
            <select class="form-select" id="prioridad" formControlName="prioridad">
              <option *ngFor="let p of prioridadOptions" [value]="p.value">{{ p.label }}</option>
            </select>
          </div>
          <div class="mb-3">
            <label for="fechaVencimiento" class="form-label">Fecha de vencimiento</label>
            <input type="date" class="form-control" id="fechaVencimiento" formControlName="fechaVencimiento">
          </div>
          <div class="modal-footer px-0">
            <button type="button" class="btn btn-secondary" (click)="onCancel()">Cancelar</button>
            <button type="submit" class="btn btn-primary" [disabled]="form.invalid">{{ task ? 'Actualizar' : 'Crear' }}</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
